server:
  port: 8080

spring:
  application:
    name: travel-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/travel_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    root: info

travel:
  auth:
    token-secret: replace-with-a-long-random-secret
    access-token-expire-seconds: 7200
    refresh-token-expire-seconds: 2592000
    wx-appid: ""
    wx-secret: ""
    mock-wx-enabled: true
